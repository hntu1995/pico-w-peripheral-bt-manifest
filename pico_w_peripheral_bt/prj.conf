# SPDX-License-Identifier: Apache-2.0
#
# prj.conf for Raspberry Pi Pico W BLE Peripheral application.
#
# The CYW43439 chip on the Pico W exposes Bluetooth via the same SPI bus as
# WiFi (PIO-SPI, not UART).  The beechwoods zephyr-cyw43-driver is used to
# initialise the chip and provide the HCI interface to Zephyr's BT stack.
# A minimal networking layer is required because that driver selects
# WIFI_USE_NATIVE_NETWORKING internally.

# ---------------------------------------------------------------------------
# Stack / heap sizes – the CYW43 driver is stack-hungry
# ---------------------------------------------------------------------------
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=16384

# ---------------------------------------------------------------------------
# CYW43 WiFi/BT driver (beechwoods – BT-over-SPI support)
# ---------------------------------------------------------------------------
CONFIG_WIFI=y
CONFIG_WIFI_ZEPHYR_CYW43=y

# Disable the official Infineon AIROC WiFi and UART-HCI BT drivers so they
# don't conflict with the beechwoods driver.
CONFIG_WIFI_AIROC=n
CONFIG_CYW43439=n

# Entropy / RNG required by CYW43 driver
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# ---------------------------------------------------------------------------
# Minimal networking stack (selected by WIFI_ZEPHYR_CYW43)
# ---------------------------------------------------------------------------
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_AUTO_INIT=n
CONFIG_NET_CONFIG_INIT_TIMEOUT=0

# ---------------------------------------------------------------------------
# Bluetooth – peripheral role
# ---------------------------------------------------------------------------
CONFIG_BT=y
CONFIG_LOG=y
CONFIG_BT_SMP=y
CONFIG_BT_PERIPHERAL=y

# Device Information Service
CONFIG_BT_DIS=y

# Battery Service
CONFIG_BT_BAS=y

# Heart Rate Service
CONFIG_BT_HRS=y

# Immediate Alert Service
CONFIG_BT_IAS=y

# Current Time Service
CONFIG_BT_CTS=y
CONFIG_BT_CTS_HELPER_API=y

CONFIG_BT_ATT_PREPARE_COUNT=5
CONFIG_BT_PRIVACY=y
CONFIG_BT_DEVICE_NAME="Pico W Peripheral"
CONFIG_BT_DEVICE_APPEARANCE=833
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_DEVICE_NAME_MAX=65
CONFIG_BT_MAX_CONN=4
CONFIG_BT_ID_MAX=2



# ---------------------------------------------------------------------------
# Persistent bond / settings storage (NVS on internal flash)
# ---------------------------------------------------------------------------
CONFIG_BT_KEYS_OVERWRITE_OLDEST=y
CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
